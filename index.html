<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位邏輯進階測驗系統 (原題版)</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .score-banner { display: none; text-align: center; background: #e8f4fd; border: 2px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 30px; font-size: 24px; font-weight: bold; color: var(--primary); }
        .question-block { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 10px; transition: all 0.3s; }
        .group-block { border: 2px solid var(--primary); background-color: #f0f8ff; padding: 25px; border-radius: 12px; margin-bottom: 40px; }
        .group-header { font-weight: bold; color: var(--primary); font-size: 1.1em; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .circuit-diagram { text-align: center; margin: 20px 0; background: white; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        .question-text { font-weight: 600; font-size: 1.05em; margin-bottom: 12px; }
        .options { list-style: none; padding: 0; }
        .option-item { margin-bottom: 10px; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .option-item:hover { background-color: #f9f9f9; }
        .option-item input { margin-right: 12px; transform: scale(1.2); flex-shrink: 0; }
        .correct-ans-label { display: none; color: var(--success); font-weight: bold; margin-top: 5px; font-size: 0.9em; }
        
        /* 狀態樣式 */
        .q-success { background-color: #d4edda !important; border-color: #c3e6cb !important; }
        .q-error { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .option-item.is-correct { border-color: var(--success); background-color: #e9f7ef; border-width: 2px; }
        .option-item.is-wrong { border-color: var(--danger); background-color: #fdf2f2; }

        .btn-container { text-align: center; margin-top: 40px; position: sticky; bottom: 20px; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        button { padding: 15px 35px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-submit { background-color: var(--success); color: white; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn-reset { background-color: #34495e; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>數位邏輯測驗系統</h1>
    <div id="score-top" class="score-banner"></div>
    <div id="quiz-container"></div>
    <div id="score-bottom" class="score-banner"></div>
    <div class="btn-container">
        <button class="btn-reset" onclick="window.location.reload()">重新產生考卷</button>
        <button id="submit-btn" class="btn-submit" onclick="gradeQuiz()">提交考卷並核對答案</button>
    </div>
</div>

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function initQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    // 1. 打亂大項目
    let shuffledQuiz = shuffle([...quizData]);
    let questionNumber = 1;

    shuffledQuiz.forEach(item => {
        if (item.type === 'single') {
            renderSingle(container, item, questionNumber++);
        } else {
            renderGroup(container, item, questionNumber);
            questionNumber += item.subQuestions.length;
        }
    });
}

function renderSingle(parent, data, num) {
    const div = document.createElement('div');
    div.className = 'question-block';
    div.dataset.ans = data.ans;
    div.dataset.score = data.score;
    
    let opts = shuffle([...data.options]);
    let optionsHtml = opts.map(o => `
        <li class="option-item">
            <input type="radio" name="q${num}" value="${o}">
            <span>${o}</span>
        </li>`).join('');

    div.innerHTML = `
        <div class="question-text">${num}. ${data.q}</div>
        <ul class="options">${optionsHtml}</ul>
        <div class="correct-ans-label">正確答案：${data.ans}</div>
    `;
    parent.appendChild(div);
}

function renderGroup(parent, data, startNum) {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'group-block';
    groupDiv.innerHTML = `<div class="group-header">${data.context}</div>${circuitSVG}`;
    
    data.subQuestions.forEach((sub, i) => {
        const qNum = startNum + i;
        const subDiv = document.createElement('div');
        subDiv.className = 'question-block';
        subDiv.style.border = 'none';
        subDiv.style.marginBottom = '15px';
        subDiv.dataset.ans = sub.ans;
        subDiv.dataset.score = sub.score;

        let opts = shuffle([...sub.options]);
        let optionsHtml = opts.map(o => `
            <li class="option-item">
                <input type="radio" name="q${qNum}" value="${o}">
                <span>${o}</span>
            </li>`).join('');

        subDiv.innerHTML = `
            <div class="question-text">${qNum}. ${sub.q}</div>
            <ul class="options">${optionsHtml}</ul>
            <div class="correct-ans-label">正確答案：${sub.ans}</div>
        `;
        groupDiv.appendChild(subDiv);
    });
    parent.appendChild(groupDiv);
}

function gradeQuiz() {
    const blocks = document.querySelectorAll('.question-block');
    let totalScore = 0;
    const submitBtn = document.getElementById('submit-btn');
    
    submitBtn.disabled = true;
    
    blocks.forEach(block => {
        const correctAns = block.dataset.ans;
        const score = parseInt(block.dataset.score);
        const selectedInput = block.querySelector('input:checked');
        const allOptions = block.querySelectorAll('.option-item');
        const correctLabel = block.querySelector('.correct-ans-label');

        // 鎖定所有輸入
        block.querySelectorAll('input').forEach(i => i.disabled = true);
        correctLabel.style.display = 'block';

        let isCorrect = false;
        if (selectedInput) {
            if (selectedInput.value === correctAns) {
                isCorrect = true;
                totalScore += score;
                block.classList.add('q-success');
            } else {
                block.classList.add('q-error');
                selectedInput.parentElement.classList.add('is-wrong');
            }
        } else {
            block.classList.add('q-error');
        }

        // 高亮正確選項
        allOptions.forEach(opt => {
            if (opt.querySelector('input').value === correctAns) {
                opt.classList.add('is-correct');
            }
        });
    });

    const banners = [document.getElementById('score-top'), document.getElementById('score-bottom')];
    banners.forEach(b => {
        b.innerHTML = `測驗完成！總分：${totalScore} / 100`;
        b.style.display = 'block';
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 初始化
initQuiz();
</script>
</body>
</html>
