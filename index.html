<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位邏輯進階測驗系統 (終極完美版)</title>
    <style>
        /* 定義亮/暗主題顏色變數 */
        :root { 
            --primary: #3498db; --success: #27ae60; --danger: #e74c3c; 
            --bg: #f4f7f6; --text-color: #333; --card-bg: #ffffff; 
            --border-color: #eee; --option-hover: #f9f9f9; --group-bg: #f0f8ff;
        }
        body.dark-mode {
            --primary: #5dade2; --success: #2ecc71; --danger: #ff6b6b; 
            --bg: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e; 
            --border-color: #333; --option-hover: #2a2a2a; --group-bg: #1a252f;
        }

        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); color: var(--text-color); line-height: 1.6; padding: 10px; margin: 0; transition: background-color 0.3s, color 0.3s; }
        
        .container { max-width: 850px; margin: 0 auto; background: var(--card-bg); padding: 20px 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; position: relative; transition: background-color 0.3s; }
        
        /* 標題與深夜模式按鈕 */
        .header-container { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 1.6em; color: var(--text-color); }
        .theme-toggle { position: absolute; right: 0; background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; outline: none; }

        /* 進度條 */
        .progress-wrapper { position: sticky; top: 0; z-index: 1000; background: var(--card-bg); padding: 10px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; transition: background-color 0.3s; }
        .progress-container { width: 100%; background-color: var(--border-color); border-radius: 10px; overflow: hidden; height: 18px; position: relative; }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; color: #fff; font-weight: bold; line-height: 18px; text-shadow: 0 0 3px rgba(0,0,0,0.5); }

        .score-banner { display: none; text-align: center; background: var(--group-bg); border: 2px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 22px; font-weight: bold; color: var(--primary); }
        .question-block { margin-bottom: 20px; padding: 15px; border: 1px solid var(--border-color); border-radius: 10px; transition: all 0.3s; }
        .group-block { border: 2px solid var(--primary); background-color: var(--group-bg); padding: 15px; border-radius: 12px; margin-bottom: 30px; transition: background-color 0.3s; }
        .group-header { font-weight: bold; color: var(--primary); font-size: 1.05em; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .circuit-diagram { text-align: center; margin: 15px 0; background: var(--card-bg); padding: 10px; border-radius: 8px; border: 1px dashed var(--border-color); overflow-x: auto; transition: background-color 0.3s; }
        
        .question-text { font-weight: 600; font-size: 1.05em; margin-bottom: 12px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        
        .option-item { padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; width: 100%; box-sizing: border-box; background-color: var(--card-bg); margin: 0; color: var(--text-color); }
        .option-item:active { background-color: var(--border-color); transform: scale(0.99); }
        .option-item:hover { background-color: var(--option-hover); }
        .option-item input { margin-right: 12px; transform: scale(1.3); flex-shrink: 0; pointer-events: none; }
        
        .correct-ans-label { display: none; color: var(--success); font-weight: bold; margin-top: 8px; font-size: 0.95em; }
        
        /* 狀態樣式 (覆蓋深夜模式) */
        .q-success { background-color: rgba(46, 204, 113, 0.15) !important; border-color: var(--success) !important; }
        .q-error { background-color: rgba(231, 76, 60, 0.15) !important; border-color: var(--danger) !important; }
        .option-item.is-correct { border-color: var(--success); background-color: rgba(46, 204, 113, 0.2); border-width: 2px; font-weight: bold; }
        .option-item.is-wrong { border-color: var(--danger); background-color: rgba(231, 76, 60, 0.2); }

        .btn-container { text-align: center; margin-top: 30px; position: sticky; bottom: 10px; display: flex; justify-content: center; gap: 10px; z-index: 100; padding: 0 10px; }
        button { padding: 12px 10px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; flex: 1; max-width: 200px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        .btn-submit { background-color: var(--success); color: white; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn-reset { background-color: #34495e; color: white; box-shadow: 0 4px 10px rgba(52,73,94,0.3); }
        button:active { opacity: 0.8; transform: translateY(2px); box-shadow: none; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; color: #fff; }

        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 40px; }
            .option-item { padding: 12px 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <h1>數位邏輯測驗系統</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>
    </div>
    
    <div class="progress-wrapper">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text" id="progress-text">作答進度：0 / 30</div>
        </div>
    </div>

    <div id="score-top" class="score-banner"></div>
    <div id="quiz-container"></div>
    <div id="score-bottom" class="score-banner"></div>
    
    <div class="btn-container">
        <button class="btn-reset" onclick="window.location.reload()">重新<br>洗牌</button>
        <button id="submit-btn" class="btn-submit" onclick="gradeQuiz()">交卷<br>對答案</button>
    </div>
</div>

<script>
// 深夜模式邏輯
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
    localStorage.setItem('quizTheme', isDark ? 'dark' : 'light');
}

// 載入儲存的主題
if (localStorage.getItem('quizTheme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-icon').innerText = '☀️';
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function initQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    let shuffledQuiz = shuffle([...quizData]);
    let questionNumber = 1;

    shuffledQuiz.forEach(item => {
        if (item.type === 'single') {
            renderSingle(container, item, questionNumber++);
        } else {
            renderGroup(container, item, questionNumber);
            questionNumber += item.subQuestions.length;
        }
    });

    // 綁定選項點擊事件以更新進度條
    document.querySelectorAll('.option-item input').forEach(input => {
        input.addEventListener('change', updateProgress);
    });
}

function renderSingle(parent, data, num) {
    const div = document.createElement('div');
    div.className = 'question-block';
    div.dataset.ans = data.ans;
    div.dataset.score = data.score;
    div.id = `question-${num}`;
    
    let opts = shuffle([...data.options]);
    let optionsHtml = opts.map(o => `
        <label class="option-item">
            <input type="radio" name="q${num}" value="${o}">
            <span>${o}</span>
        </label>`).join('');

    div.innerHTML = `
        <div class="question-text" id="qt-${num}">${num}. ${data.q}</div>
        <div class="options">${optionsHtml}</div>
        <div class="correct-ans-label">正確答案：${data.ans}</div>
    `;
    parent.appendChild(div);
}

function renderGroup(parent, data, startNum) {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'group-block';
    groupDiv.innerHTML = `<div class="group-header">${data.context}</div>${circuitSVG}`;
    
    data.subQuestions.forEach((sub, i) => {
        const qNum = startNum + i;
        const subDiv = document.createElement('div');
        subDiv.className = 'question-block';
        subDiv.style.border = 'none';
        subDiv.style.marginBottom = '15px';
        subDiv.style.padding = '0';
        subDiv.dataset.ans = sub.ans;
        subDiv.dataset.score = sub.score;
        subDiv.id = `question-${qNum}`;

        let opts = shuffle([...sub.options]);
        let optionsHtml = opts.map(o => `
            <label class="option-item">
                <input type="radio" name="q${qNum}" value="${o}">
                <span>${o}</span>
            </label>`).join('');

        subDiv.innerHTML = `
            <div class="question-text" id="qt-${qNum}">${qNum}. ${sub.q}</div>
            <div class="options">${optionsHtml}</div>
            <div class="correct-ans-label">正確答案：${sub.ans}</div>
        `;
        groupDiv.appendChild(subDiv);
    });
    parent.appendChild(groupDiv);
}

function updateProgress() {
    const totalQuestions = 30; // 總題數
    const answered = new Set([...document.querySelectorAll('input[type="radio"]:checked')].map(el => el.name)).size;
    const percentage = (answered / totalQuestions) * 100;
    
    document.getElementById('progress-bar').style.width = percentage + '%';
    document.getElementById('progress-text').innerText = `作答進度：${answered} / ${totalQuestions}`;
}

function gradeQuiz() {
    const totalQuestions = 30;
    const answered = new Set([...document.querySelectorAll('input[type="radio"]:checked')].map(el => el.name)).size;

    // 1. 交卷防呆機制
    if (answered < totalQuestions) {
        const confirmSubmit = confirm(`⚠️ 提醒您！您還有 ${totalQuestions - answered} 題尚未作答。\n\n確定要提早交卷嗎？`);
        if (!confirmSubmit) {
            // 自動捲動到第一題未作答的題目
            const blocks = document.querySelectorAll('.question-block');
            for (let block of blocks) {
                if (!block.querySelector('input:checked')) {
                    block.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // 讓未作答的題目閃爍一下提醒
                    block.style.backgroundColor = 'rgba(231, 76, 60, 0.1)';
                    setTimeout(() => block.style.backgroundColor = '', 1000);
                    break;
                }
            }
            return; // 終止交卷
        }
    }

    const blocks = document.querySelectorAll('.question-block');
    let totalScore = 0;
    const submitBtn = document.getElementById('submit-btn');
    
    submitBtn.disabled = true;
    
    blocks.forEach(block => {
        const correctAns = block.dataset.ans;
        const score = parseInt(block.dataset.score);
        const selectedInput = block.querySelector('input:checked');
        const allOptions = block.querySelectorAll('.option-item');
        const correctLabel = block.querySelector('.correct-ans-label');

        block.querySelectorAll('input').forEach(i => i.disabled = true);
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');
        correctLabel.style.display = 'block';

        if (selectedInput) {
            if (selectedInput.value === correctAns) {
                totalScore += score;
                block.classList.add('q-success');
            } else {
                block.classList.add('q-error');
                selectedInput.parentElement.classList.add('is-wrong');
            }
        } else {
            block.classList.add('q-error');
        }

        allOptions.forEach(opt => {
            if (opt.querySelector('input').value === correctAns) {
                opt.classList.add('is-correct');
            }
        });
    });

    const banners = [document.getElementById('score-top'), document.getElementById('score-bottom')];
    banners.forEach(b => {
        b.innerHTML = `測驗完成！總分：${totalScore} / 100`;
        b.style.display = 'block';
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

initQuiz();
</script>
</body>
</html>
